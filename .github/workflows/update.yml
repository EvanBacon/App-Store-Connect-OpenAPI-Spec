name: Update Apple Spec

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/update.yml
      - specs/**
      - update/**
  schedule:
    # Runs at 10:00 and 20:00 UTC daily
    - cron: "0 10,20 * * *"
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: write # Needed for creating pull requests
  pull-requests: write # Needed for PR operations
  issues: write # Needed for failure notifications

jobs:
  update-spec:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensures full history for PR creation

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: update

      - name: Run update script
        id: update
        working-directory: update
        run: bun run ./index.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Apple API version
        if: steps.update.outputs.has_update == 'true'
        working-directory: update
        run: echo "APPLE_API_VERSION=$(cat apple-api-version.txt)" >> $GITHUB_ENV

      - name: Read diff summary
        if: steps.update.outputs.has_update == 'true'
        working-directory: update
        run: |
          if [ -f diff-summary.md ]; then
            {
              echo 'DIFF_SUMMARY<<EOF'
              cat diff-summary.md
              echo 'EOF'
            } >> $GITHUB_ENV
          fi

      - name: Check for existing PR
        if: steps.update.outputs.has_update == 'true'
        id: check_pr
        run: |
          EXISTING_PR=$(gh pr list --head "spec/update-v${{ env.APPLE_API_VERSION }}" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists for v${{ env.APPLE_API_VERSION }}"
            echo "pr_exists=true" >> $GITHUB_OUTPUT
          else
            echo "pr_exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        if: steps.update.outputs.has_update == 'true' && steps.check_pr.outputs.pr_exists != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update App Store Connect API to v${{ env.APPLE_API_VERSION }}"
          base: main
          branch: spec/update-v${{ env.APPLE_API_VERSION }}
          title: "chore: update App Store Connect API to v${{ env.APPLE_API_VERSION }}"
          body: |
            Updates the App Store Connect API specification to version ${{ env.APPLE_API_VERSION }}.

            ## Changes

            ${{ env.DIFF_SUMMARY }}

            ---

            See the [App Store Connect API documentation](https://developer.apple.com/documentation/appstoreconnectapi) for more details.

            This PR was auto-generated by the Update Apple Spec workflow.
          reviewers: EvanBacon
          labels: automerge, api-update
          add-paths: |
            specs/*.json
            update/apple-api-version.txt

  notify-failure:
    runs-on: ubuntu-latest
    needs: update-spec
    if: failure() && github.event_name == 'schedule'
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Spec update workflow failed on ${new Date().toISOString().slice(0, 10)}`;
            // Check if an open issue already exists
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'workflow-failure',
              per_page: 1,
            });
            if (issues.length > 0) {
              // Comment on existing issue instead of creating a new one
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `Workflow failed again: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `The scheduled spec update workflow has failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nPlease investigate.`,
                labels: ['workflow-failure'],
              });
            }
